name: Airflow CI/CD Pipeline

on:
    push:
        branches:
            - main

jobs:
    detect-changes:
        runs-on: ubuntu-latest
        outputs:
            mysql_changed: ${{ steps.filter.outputs.mysql }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Detect MySQL migration-related changes
              id: filter
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      mysql:
                        - 'docker/mysql/**'

    migrate-db:
        runs-on: ubuntu-latest
        needs: detect-changes
        if: needs.detect-changes.outputs.mysql_changed == 'true'

        steps:
            - name: Run MySQL migrations on GCP VM
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.VM_HOST }}
                  username: ${{ secrets.VM_USER }}
                  key: ${{ secrets.SSH_KEY }}
                  script: |
                      set -euo pipefail

                      cd Build-Data-Pipeline-using-Apache-Arirflow

                      sudo chown -R $USER:$USER .

                      git fetch origin
                      git checkout -f ${{ github.sha }}
                      git rev-parse --short HEAD

                      docker compose up -d mysql
                      MYSQL_CID=$(docker compose ps -q mysql)
                      if [ -z "$MYSQL_CID" ]; then
                        echo "MySQL container not found"
                        exit 1
                      fi
                      until [ "$(docker inspect -f '{{.State.Health.Status}}' "$MYSQL_CID")" = "healthy" ]; do
                        echo "Waiting for MySQL to become healthy..."
                        sleep 5
                      done
                      DB_NAME="${MYSQL_DATABASE:-${MYSQL_DB:-airflow}}"
                      DB_USER="${MYSQL_USER:-airflow}"
                      DB_PASS="${MYSQL_PASSWORD:-}"
                      ROOT_PASS="${MYSQL_ROOT_PASSWORD:-}"

                      if [ -z "$DB_PASS" ] && [ -z "$ROOT_PASS" ]; then
                        echo "Both MYSQL_PASSWORD and MYSQL_ROOT_PASSWORD are empty."
                        exit 1
                      fi

                      if [ -n "$DB_PASS" ] && docker compose exec -T mysql sh -lc "mysql -u\"$DB_USER\" -p\"$DB_PASS\" \"$DB_NAME\" -e \"SELECT 1\" >/dev/null 2>&1"; then
                        echo "Using app MySQL user: $DB_USER"
                      elif [ -n "$ROOT_PASS" ] && docker compose exec -T mysql sh -lc "mysql -uroot -p\"$ROOT_PASS\" \"$DB_NAME\" -e \"SELECT 1\" >/dev/null 2>&1"; then
                        DB_USER="root"
                        DB_PASS="$ROOT_PASS"
                        echo "Fallback to MySQL root user"
                      else
                        echo "Unable to authenticate to MySQL with app user or root user"
                        exit 1
                      fi

                      # Backup current weather table before schema/data migration.
                      if docker compose exec -T mysql sh -lc "mysql -u\"$DB_USER\" -p\"$DB_PASS\" \"$DB_NAME\" -Nse \"SHOW TABLES LIKE 'weather_observations'\"" | grep -q weather_observations; then
                        ts=$(date +%Y%m%d_%H%M%S)
                        docker compose exec -T mysql sh -lc "mysql -u\"$DB_USER\" -p\"$DB_PASS\" \"$DB_NAME\" -e \"CREATE TABLE weather_observations_backup_${ts} LIKE weather_observations; INSERT INTO weather_observations_backup_${ts} SELECT * FROM weather_observations; SHOW TABLES LIKE 'weather_observations_backup_%';\""
                      else
                        echo "weather_observations table not found, skipping backup"
                      fi

                      docker compose exec -T mysql sh -lc "mysql -u\"$DB_USER\" -p\"$DB_PASS\" \"$DB_NAME\"" < docker/mysql/migrations/001_weather_observations_region_upgrade.sql
                      docker compose exec -T mysql sh -lc "mysql -u\"$DB_USER\" -p\"$DB_PASS\" \"$DB_NAME\"" < docker/mysql/migrations/002_weather_observations_daily_uniqueness.sql
                      docker compose exec -T mysql sh -lc "mysql -u\"$DB_USER\" -p\"$DB_PASS\" \"$DB_NAME\"" < docker/mysql/migrations/003_weather_observations_snapshot_date.sql

                      # Verify uniqueness after migration to fail fast if inconsistent.
                      docker compose exec -T mysql sh -lc "mysql -u\"$DB_USER\" -p\"$DB_PASS\" \"$DB_NAME\" -e \"SHOW INDEX FROM weather_observations; SELECT COUNT(*) AS total_rows, COUNT(DISTINCT CONCAT(province, '|', snapshot_date)) AS distinct_province_day FROM weather_observations; SELECT province, snapshot_date, COUNT(*) AS cnt FROM weather_observations GROUP BY province, snapshot_date HAVING COUNT(*) > 1 LIMIT 20;\""

            - name: Notify migration failure (Discord/Slack)
              if: failure()
              env:
                  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
                  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
              run: |
                  set -euo pipefail
                  MSG="Migration job failed before deploy. Repo=${{ github.repository }}, workflow=${{ github.workflow }}, run=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

                  if [ -n "${DISCORD_WEBHOOK:-}" ]; then
                    curl -sS -X POST "$DISCORD_WEBHOOK" \
                      -H "Content-Type: application/json" \
                      -d "{\"content\":\"$MSG\"}" >/dev/null
                  fi

                  if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
                    curl -sS -X POST "$SLACK_WEBHOOK_URL" \
                      -H "Content-type: application/json" \
                      -d "{\"text\":\"$MSG\"}" >/dev/null
                  fi

    deploy:
        runs-on: ubuntu-latest
        needs: [detect-changes, migrate-db]
        if: |
            always() &&
            (
              needs.detect-changes.outputs.mysql_changed != 'true' ||
              needs.migrate-db.result == 'success'
            )

        steps:
            - name: Deploy to GCP VM
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.VM_HOST }}
                  username: ${{ secrets.VM_USER }}
                  key: ${{ secrets.SSH_KEY }}
                  script: |
                      set -e

                      cd Build-Data-Pipeline-using-Apache-Arirflow

                      sudo chown -R $USER:$USER .

                      git fetch origin
                      git checkout -f ${{ github.sha }}
                      git rev-parse --short HEAD

                      # create necessary directories and set permissions for Airflow
                      sudo mkdir -p dags logs data scripts
                      sudo chown -R 50000:0 dags logs data scripts

                      docker compose config
                      docker compose pull
                      docker compose build airflow-init webserver scheduler worker triggerer flower

                      docker compose up -d postgres mysql redis
                      docker compose up -d renderer loki promtail grafana portainer mailhog
                      docker compose up airflow-init || (docker compose logs --tail=100 airflow-init && exit 1)
                      docker compose up -d webserver scheduler worker triggerer flower
