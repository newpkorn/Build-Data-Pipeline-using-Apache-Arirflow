name: Deploy Airflow

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Deploy to GCP VM
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.VM_HOST }}
                  username: ${{ secrets.VM_USER }}
                  key: ${{ secrets.SSH_KEY }}
                  script: |
                      cd Build-Data-Pipeline-using-Apache-Arirflow
                      git pull
                      docker compose down
                      docker compose up -d --build
