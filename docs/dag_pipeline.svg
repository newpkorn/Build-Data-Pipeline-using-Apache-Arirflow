<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="860" fill="#F8FAFC"/>
  <text x="90" y="110" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700">ETL Workflow Pattern</text>
  <text x="90" y="154" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="22">Reference pipeline structure used across weather, FX, and API ingestion workloads.</text>

  <rect x="120" y="330" width="220" height="140" rx="24" fill="#0F172A"/>
  <text x="160" y="392" fill="#7DD3FC" font-family="Arial, Helvetica, sans-serif" font-size="22">STEP 1</text>
  <text x="160" y="438" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Extract</text>

  <rect x="430" y="330" width="220" height="140" rx="24" fill="#082F49"/>
  <text x="470" y="392" fill="#7DD3FC" font-family="Arial, Helvetica, sans-serif" font-size="22">STEP 2</text>
  <text x="470" y="438" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Transform</text>

  <rect x="740" y="330" width="220" height="140" rx="24" fill="#14532D"/>
  <text x="780" y="392" fill="#BBF7D0" font-family="Arial, Helvetica, sans-serif" font-size="22">STEP 3</text>
  <text x="780" y="438" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Load</text>

  <rect x="1050" y="330" width="220" height="140" rx="24" fill="#7C2D12"/>
  <text x="1090" y="392" fill="#FED7AA" font-family="Arial, Helvetica, sans-serif" font-size="22">STEP 4</text>
  <text x="1090" y="438" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Report</text>

  <path d="M340 400H430" stroke="#94A3B8" stroke-width="4" stroke-dasharray="10 10"/>
  <path d="M650 400H740" stroke="#94A3B8" stroke-width="4" stroke-dasharray="10 10"/>
  <path d="M960 400H1050" stroke="#94A3B8" stroke-width="4" stroke-dasharray="10 10"/>

  <rect x="280" y="580" width="840" height="140" rx="26" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="322" y="634" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Typical Pipeline Outcome</text>
  <text x="322" y="678" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="22">Validated records are persisted to MySQL, surfaced in Grafana, and trigger notifications to email and Discord when success or failure events occur.</text>
</svg>
